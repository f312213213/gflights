name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            bun_target: bun-darwin-x64
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build binary
        run: bun build src/cli.ts --compile --target=${{ matrix.bun_target }} --outfile gflights-${{ matrix.target }}

      - name: Compress
        run: |
          tar czf gflights-${{ matrix.target }}.tar.gz gflights-${{ matrix.target }}
          shasum -a 256 gflights-${{ matrix.target }}.tar.gz > gflights-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: gflights-${{ matrix.target }}
          path: |
            gflights-${{ matrix.target }}.tar.gz
            gflights-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gflights-*.tar.gz
            gflights-*.tar.gz.sha256

  npm-publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-formula:
    needs: npm-publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.npmjs.org/gflights/-/gflights-${VERSION}.tgz"
          sleep 10
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          cat > Formula/gflights.rb << FORMULA
          class Gflights < Formula
            desc "Search Google Flights from the terminal"
            homepage "https://github.com/f312213213/gflights"
            url "${URL}"
            sha256 "${SHA}"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
            end

            test do
              assert_match "Usage:", shell_output("#{bin}/gflights --help")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/gflights.rb

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gflights.rb
          git diff --staged --quiet || (git commit -m "formula: update to ${GITHUB_REF_NAME}" && git push)
